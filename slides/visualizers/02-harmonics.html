<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>waveshaping — harmonics</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" onload="window.__renderMath && window.__renderMath()"></script>
<style>
  :root {
    --ink: #1c2333;
    --grid: #d7dce5;
    --muted: #5a6372;
    --faint: #9aa4b2;
    --paper: #ffffff;
    --page: #f2f3f0;
    --accent: #e4572e;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--page);
    color: var(--ink);
    font-family: var(--mono);
    overflow: auto;
  }
  #stage {
    position: relative;
    width: 100%;
    height: 100vh;
    min-width: 780px;
    min-height: 540px;
  }
  canvas { position: absolute; inset: 0; display: block; }

  #title {
    position: absolute;
    left: 30px; top: 12px;
    font-size: 14px;
    letter-spacing: 0.04em;
    color: var(--ink);
    user-select: none;
  }
  #title span { color: var(--muted); }

  #nav {
    position: absolute;
    top: 12px; right: 30px;
    font-size: 14px;
    letter-spacing: 0.04em;
    user-select: none;
  }
  #nav a { color: var(--muted); text-decoration: none; margin-left: 16px; }
  #nav a:hover { color: var(--ink); }
  #nav a.here { color: var(--ink); }

  #controls {
    position: absolute;
    display: flex;
    flex-direction: column;
    justify-content: safe center;
    gap: 10px;
    padding: 4px 2px;
    min-width: 0;
    overflow: hidden auto;
  }
  #controls > * { flex-shrink: 0; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  #fns, #cheb { gap: 6px; }

  #math {
    min-height: 56px;
    display: flex;
    align-items: center;
    font-size: 16px;
    color: var(--ink);
    padding: 4px 0;
    overflow: auto hidden;
  }
  #math .katex-display { margin: 0; }
  #math .katex-display > .katex { text-align: left; }
  .chip {
    font-family: var(--mono);
    font-size: 13.5px;
    color: var(--muted);
    background: var(--paper);
    border: 1px solid var(--grid);
    border-radius: 3px;
    padding: 5px 10px 5px 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    line-height: 1;
  }
  .chip .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--c);
    opacity: 0.45;
    flex: none;
  }
  .chip:hover { border-color: var(--muted); }
  .chip[aria-pressed="true"] {
    color: var(--ink);
    border-color: var(--c);
    box-shadow: inset 0 0 0 1px var(--c);
  }
  .chip[aria-pressed="true"] .dot { opacity: 1; }
  .chip:focus-visible, input[type=range]:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }

  .sliderrow { gap: 10px; flex-wrap: nowrap; }
  .sliderrow label { font-size: 13.5px; color: var(--muted); min-width: 5ch; }
  input[type=range] {
    flex: 1 1 90px;
    max-width: 240px;
    accent-color: var(--accent);
    height: 18px;
  }
  .val {
    font-size: 13.5px;
    color: var(--ink);
    min-width: 6ch;
    text-align: right;
  }

  #eq {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.02em;
    line-height: 1.7;
  }

  #soundbtn {
    background: var(--paper);
    border: 1px solid var(--grid);
    border-radius: 3px;
    width: 42px; height: 26px;
    cursor: pointer;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  #soundbtn:hover { border-color: var(--muted); }
  #soundbtn[aria-pressed="true"] {
    color: var(--ink);
    border-color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  #soundbtn:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }
  #soundbtn svg { display: block; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>
  <div id="title">waveshaping <span>— harmonics</span></div>
  <div id="nav">
    <a href="01-transfer-curve.html">01 transfer</a>
    <a href="02-harmonics.html" class="here">02 harmonics</a>
    <a href="03-imperfection-decomposer.html">03 even/odd</a>
    <a href="04-aliasing.html">04 aliasing</a>
  </div>
  <div id="controls">
    <div class="row" id="fns"></div>
    <div class="row" id="cheb"></div>
    <div id="math" aria-live="polite"></div>
    <div class="row sliderrow">
      <label for="drive">drive</label>
      <input id="drive" type="range" min="0.05" max="2.5" step="0.01" value="1.5">
      <span class="val" id="driveval">1.50×</span>
    </div>
    <div class="row sliderrow">
      <label for="bias">bias</label>
      <input id="bias" type="range" min="-1" max="1" step="0.01" value="0">
      <span class="val" id="biasval">+0.00</span>
    </div>
    <div class="row">
      <button id="soundbtn" aria-pressed="false" aria-label="sound" title="sound">
        <svg width="18" height="16" viewBox="0 0 20 16" fill="none" stroke="currentColor"
          stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 6v4h3l4 3.5v-11L5 6H2z" fill="currentColor" stroke="none"/>
          <path d="M12.5 5.5a4.2 4.2 0 0 1 0 5"/>
          <path d="M15.2 3.5a7.5 7.5 0 0 1 0 9"/>
        </svg>
      </button>
    </div>
    <div id="eq">y[n] = g( drive · x[n] + bias )<br>x[n] = sine at f₀</div>
  </div>
</div>

<script>
"use strict";

const INK = "#1c2333", GRID = "#d7dce5", FAINT = "#9aa4b2", MUT = "#5a6372";
const CHEB_C = "#a97142";

const SHAPERS = [
  { id: "wire",  label: "y = x",      color: "#9aa4b2", f: x => x,
    tex: "g(x) = x",
    plain: "g(x) = x" },
  { id: "hard",  label: "hard clip",  color: "#e4572e", f: x => Math.max(-1, Math.min(1, x)),
    tex: "g(x) = \\max(-1,\\ \\min(1,\\ x))",
    plain: "g(x) = max(-1, min(1, x))" },
  { id: "cubic", label: "cubic",      color: "#f6a600", f: x => x <= -1 ? -2/3 : x >= 1 ? 2/3 : x - x*x*x/3,
    tex: "g(x) = \\begin{cases} -\\tfrac{2}{3} & x \\le -1 \\\\[2pt] x - \\tfrac{x^{3}}{3} & -1 < x < 1 \\\\[2pt] \\tfrac{2}{3} & x \\ge 1 \\end{cases}",
    plain: "g(x) = x - x³/3, clamped to ±2/3" },
  { id: "tanh",  label: "tanh",       color: "#3a7ca5", f: Math.tanh,
    tex: "g(x) = \\tanh(x)",
    plain: "g(x) = tanh(x)" },
  { id: "sig",   label: "x/√(1+x²)", color: "#2a9d8f", f: x => x / Math.sqrt(1 + x*x),
    tex: "g(x) = \\dfrac{x}{\\sqrt{1 + x^{2}}}",
    plain: "g(x) = x / √(1 + x²)" },
  { id: "fold",  label: "fold",       color: "#9b59b6", f: x => Math.sin(Math.PI * 0.5 * x),
    tex: "g(x) = \\sin\\!\\left(\\tfrac{\\pi}{2}\\,x\\right)",
    plain: "g(x) = sin(πx/2)" },
  { id: "T2", label: "T₂", color: CHEB_C, cheb: true, f: x => 2*x*x - 1,
    tex: "g(x) = T_{2}(x) = 2x^{2} - 1",
    plain: "g(x) = T₂(x) = 2x² - 1" },
  { id: "T3", label: "T₃", color: CHEB_C, cheb: true, f: x => 4*x*x*x - 3*x,
    tex: "g(x) = T_{3}(x) = 4x^{3} - 3x",
    plain: "g(x) = T₃(x) = 4x³ - 3x" },
  { id: "T4", label: "T₄", color: CHEB_C, cheb: true, f: x => 8*x*x*x*x - 8*x*x + 1,
    tex: "g(x) = T_{4}(x) = 8x^{4} - 8x^{2} + 1",
    plain: "g(x) = T₄(x) = 8x⁴ - 8x² + 1" },
  { id: "T5", label: "T₅", color: CHEB_C, cheb: true, f: x => 16*x*x*x*x*x - 20*x*x*x + 5*x,
    tex: "g(x) = T_{5}(x) = 16x^{5} - 20x^{3} + 5x",
    plain: "g(x) = T₅(x) = 16x⁵ - 20x³ + 5x" },
];

const A = 2.5;        // shared amplitude range (curve x & y, waveform y)
const CYCLES = 2;     // cycles shown in the waveform window
const PERIOD = 6000;  // ms for the tracer to cross the window
const KMAX = 24;      // harmonics shown
const NDFT = 1024;    // samples of one period for the DFT
const DB_TOP = 12, DB_FLOOR = -60;

const state = {
  shaper: 1,          // hard clip
  drive: 1.5,
  bias: 0,
  tau: 0.155,
  paused: false,
};
const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
if (reducedMotion) state.paused = true;

const stage = document.getElementById("stage");
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const controls = document.getElementById("controls");
const driveEl = document.getElementById("drive");
const driveVal = document.getElementById("driveval");
const biasEl = document.getElementById("bias");
const biasVal = document.getElementById("biasval");

let dirty = true;

// ---- controls ----------------------------------------------------------

const fnsEl = document.getElementById("fns");
const chebEl = document.getElementById("cheb");
SHAPERS.forEach((s, i) => {
  const b = document.createElement("button");
  b.className = "chip";
  b.style.setProperty("--c", s.color);
  b.setAttribute("aria-pressed", String(i === state.shaper));
  b.innerHTML = `<span class="dot"></span>${s.label}`;
  b.addEventListener("click", () => {
    state.shaper = i;
    if (s.cheb) {         // Tₙ is a pure n-th harmonic only at drive 1, no bias
      state.drive = 1.0;
      state.bias = 0;
    }
    syncControls();
    dirty = true;
  });
  (s.cheb ? chebEl : fnsEl).appendChild(b);
});

driveEl.addEventListener("input", () => {
  state.drive = parseFloat(driveEl.value);
  syncControls();
  dirty = true;
});
biasEl.addEventListener("input", () => {
  state.bias = parseFloat(biasEl.value);
  syncControls();
  dirty = true;
});

const fmt = v => (v < 0 ? "−" : "+") + Math.abs(v).toFixed(2);

const mathEl = document.getElementById("math");
function renderMath() {
  const s = SHAPERS[state.shaper];
  if (window.katex) {
    katex.render(s.tex, mathEl, { displayMode: true, throwOnError: false });
  } else {
    mathEl.textContent = s.plain;
  }
}
window.__renderMath = renderMath;

function syncControls() {
  const chips = [...fnsEl.children, ...chebEl.children];
  chips.forEach((b, i) => b.setAttribute("aria-pressed", String(i === state.shaper)));
  document.documentElement.style.setProperty("--accent", SHAPERS[state.shaper].color);
  driveEl.value = state.drive;
  biasEl.value = state.bias;
  driveVal.textContent = state.drive.toFixed(2) + "×";
  biasVal.textContent = fmt(state.bias);
  renderMath();
  updateAudio();
}
syncControls();

// ---- sound ---------------------------------------------------------------
// The audio path mirrors the page: sine oscillator -> WaveShaperNode holding
// f(drive * x + bias) -> DC blocker -> gain. The node's curve IS the transfer
// curve, and the DC blocker is the highpass the lecture prescribes for bias.

var audio = null;    // var: hoisted, so the syncControls() call above the
var soundOn = false; // sound module can safely hit updateAudio's guard
const soundBtn = document.getElementById("soundbtn");

function bakeCurve() {
  const f = SHAPERS[state.shaper].f;
  const N = 2049;
  const curve = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    const x = -1 + 2 * i / (N - 1);
    curve[i] = Math.max(-2, Math.min(2, f(state.drive * x + state.bias)));
  }
  return curve;
}

function updateAudio() {
  if (!audio || !soundOn) return;
  audio.shaper.curve = bakeCurve();
}

function startAudio() {
  if (!audio) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.value = 110;
    const shaper = ctx.createWaveShaper();
    shaper.oversample = "4x";
    const dcblock = ctx.createBiquadFilter();
    dcblock.type = "highpass";
    dcblock.frequency.value = 8;
    const gain = ctx.createGain();
    gain.gain.value = 0;
    osc.connect(shaper).connect(dcblock).connect(gain).connect(ctx.destination);
    osc.start();
    audio = { ctx, osc, shaper, gain };
  }
  audio.ctx.resume();
  audio.shaper.curve = bakeCurve();
  const t = audio.ctx.currentTime;
  audio.gain.gain.cancelScheduledValues(t);
  audio.gain.gain.setTargetAtTime(0.15, t, 0.02);
}

function stopAudio() {
  if (!audio) return;
  const t = audio.ctx.currentTime;
  audio.gain.gain.cancelScheduledValues(t);
  audio.gain.gain.setTargetAtTime(0, t, 0.02);
  setTimeout(() => { if (!soundOn && audio) audio.ctx.suspend(); }, 250);
}

soundBtn.addEventListener("click", () => {
  soundOn = !soundOn;
  soundBtn.setAttribute("aria-pressed", String(soundOn));
  soundOn ? startAudio() : stopAudio();
});

// ---- layout ------------------------------------------------------------

let R = null;

function layout() {
  const W = stage.clientWidth, H = stage.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  cv.width = Math.round(W * dpr);
  cv.height = Math.round(H * dpr);
  cv.style.width = W + "px";
  cv.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const pad = 30, top = 44, gap = 30;
  const availH = H - top - pad - gap;
  const availW = W - 2 * pad - gap;
  let S = Math.floor(Math.min(0.55 * availH, 0.48 * availW));
  S = Math.max(250, S);
  const botH = Math.max(150, availH - S);
  const outW = Math.max(210, availW - S);

  R = {
    curve:  { x: pad, y: top, w: S, h: S },
    output: { x: pad + S + gap, y: top, w: outW, h: S },
    spec:   { x: pad + S + gap, y: top + S + gap, w: outW, h: botH },
    ctrl:   { x: pad, y: top + S + gap, w: S, h: botH },
  };

  controls.style.left = R.ctrl.x + "px";
  controls.style.top = R.ctrl.y + "px";
  controls.style.width = R.ctrl.w + "px";
  controls.style.height = R.ctrl.h + "px";
}
window.addEventListener("resize", layout);
layout();

// ---- mapping -----------------------------------------------------------

const ampX = a => R.curve.x + (a + A) / (2 * A) * R.curve.w;
const ampY = a => R.curve.y + R.curve.h - (a + A) / (2 * A) * R.curve.h;
const tX = t => R.output.x + t * R.output.w;

const inAt = t => state.drive * Math.sin(2 * Math.PI * t * CYCLES) + state.bias;

// ---- spectrum ----------------------------------------------------------

const target = new Float64Array(KMAX + 1); // exact amplitude per harmonic (hover readout), [0] = |DC|
let dcValue = 0;

// ---- FFT analyzer curve --------------------------------------------------
// A real windowed FFT, like a DAW spectrum analyzer: CYC cycles of f0 in an
// FFT_N window, Blackman-Harris so peaks sit on a clean floor.
const FFT_N = 8192;
const CYC = 32;                          // bin k*CYC is harmonic k
const HMAX = KMAX + 0.5;                 // axis reach, in harmonic units
const MAXBIN = Math.floor(HMAX * CYC);
const win = new Float64Array(FFT_N);
let winSum = 0;
for (let n = 0; n < FFT_N; n++) {
  const t = 2 * Math.PI * n / (FFT_N - 1);
  win[n] = 0.35875 - 0.48829 * Math.cos(t) + 0.14128 * Math.cos(2 * t) - 0.01168 * Math.cos(3 * t);
  winSum += win[n];
}
const fftRe = new Float64Array(FFT_N), fftIm = new Float64Array(FFT_N);
const curveDb = new Float64Array(MAXBIN + 1);   // target height fraction per bin
const curveDisp = new Float64Array(MAXBIN + 1); // smoothed display

function fftInPlace(re, im) {
  const n = re.length;
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      let t = re[i]; re[i] = re[j]; re[j] = t;
      t = im[i]; im[i] = im[j]; im[j] = t;
    }
  }
  for (let len = 2; len <= n; len <<= 1) {
    const ang = -2 * Math.PI / len;
    const wr = Math.cos(ang), wi = Math.sin(ang);
    const half = len >> 1;
    for (let i = 0; i < n; i += len) {
      let cr = 1, ci = 0;
      for (let k = 0; k < half; k++) {
        const ur = re[i + k], ui = im[i + k];
        const vr = re[i + k + half] * cr - im[i + k + half] * ci;
        const vi = re[i + k + half] * ci + im[i + k + half] * cr;
        re[i + k] = ur + vr; im[i + k] = ui + vi;
        re[i + k + half] = ur - vr; im[i + k + half] = ui - vi;
        const ncr = cr * wr - ci * wi; ci = cr * wi + ci * wr; cr = ncr;
      }
    }
  }
}

function computeCurve() {
  const f = SHAPERS[state.shaper].f;
  for (let n = 0; n < FFT_N; n++) {
    fftRe[n] = win[n] * f(state.drive * Math.sin(2 * Math.PI * CYC * n / FFT_N) + state.bias);
    fftIm[n] = 0;
  }
  fftInPlace(fftRe, fftIm);
  for (let k = 0; k <= MAXBIN; k++) {
    const mag = Math.hypot(fftRe[k], fftIm[k]) / winSum * (k === 0 ? 1 : 2);
    const db = 20 * Math.log10(Math.max(mag, 1e-12));
    curveDb[k] = Math.min(1, Math.max(0, (db - DB_FLOOR) / (DB_TOP - DB_FLOOR)));
  }
}

function computeSpectrum() {
  const f = SHAPERS[state.shaper].f;
  const y = new Float64Array(NDFT);
  let mean = 0;
  for (let n = 0; n < NDFT; n++) {
    y[n] = f(state.drive * Math.sin(2 * Math.PI * n / NDFT) + state.bias);
    mean += y[n];
  }
  mean /= NDFT;
  dcValue = mean;
  target[0] = Math.abs(mean);
  for (let k = 1; k <= KMAX; k++) {
    let re = 0, im = 0;
    for (let n = 0; n < NDFT; n++) {
      const ph = 2 * Math.PI * k * n / NDFT;
      re += y[n] * Math.cos(ph);
      im += y[n] * Math.sin(ph);
    }
    target[k] = 2 * Math.hypot(re, im) / NDFT;
  }
}

// ---- drawing -----------------------------------------------------------

function panelBase(r) {
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(r.x, r.y, r.w, r.h);
}
function panelFrame(r) {
  ctx.strokeStyle = INK;
  ctx.lineWidth = 1.2;
  ctx.strokeRect(r.x + 0.5, r.y + 0.5, r.w - 1, r.h - 1);
}
function clipTo(r, fn) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(r.x, r.y, r.w, r.h);
  ctx.clip();
  fn();
  ctx.restore();
}
function axes(r, vertical, horizontal) {
  // zero axes only; the accent range lines carry the rest of the story
  ctx.strokeStyle = INK;
  ctx.lineWidth = 1;
  ctx.beginPath();
  if (vertical)   { const px = ampX(0); ctx.moveTo(px, r.y); ctx.lineTo(px, r.y + r.h); }
  if (horizontal) { const py = ampY(0); ctx.moveTo(r.x, py); ctx.lineTo(r.x + r.w, py); }
  ctx.stroke();
}
function curveTicks() {
  // small ticks at ±1, ±2 on both zero axes of the curve panel
  ctx.strokeStyle = INK;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (const a of [-2, -1, 1, 2]) {
    ctx.moveTo(ampX(a), ampY(0) - 4); ctx.lineTo(ampX(a), ampY(0) + 4);
    ctx.moveTo(ampX(0) - 4, ampY(a)); ctx.lineTo(ampX(0) + 4, ampY(a));
  }
  ctx.stroke();
}
function label(text, x, y, color = INK, align = "left") {
  ctx.font = "13px Menlo, Consolas, monospace";
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.textBaseline = "top";
  ctx.fillText(text, x, y);
}
function arrowHead(x, y, dx, dy, size, color, alpha) {
  const len = Math.hypot(dx, dy) || 1;
  const ux = dx / len, uy = dy / len;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - ux * size - uy * size * 0.5, y - uy * size + ux * size * 0.5);
  ctx.lineTo(x - ux * size + uy * size * 0.5, y - uy * size - ux * size * 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

let hover = null; // {x, y} in canvas coords

function drawSpectrum(r, s) {
  panelBase(r);

  const leftInset = 34, labelStrip = 18, topInset = 8;
  const px0 = r.x + leftInset, pw = r.w - leftInset - 10;
  const py0 = r.y + topInset, ph = r.h - topInset - labelStrip - 6;
  const baseY = py0 + ph;
  const xOf = h => px0 + (h + 0.5) / (HMAX + 0.5) * pw;  // harmonic units -> px
  const dbY = db => baseY - (db - DB_FLOOR) / (DB_TOP - DB_FLOOR) * ph;
  const slotW = pw / (HMAX + 0.5);

  // even-harmonic bands, faintly shaded: empty until symmetry breaks
  ctx.fillStyle = "#f2f4f8";
  for (let k = 2; k <= KMAX; k += 2) {
    ctx.fillRect(xOf(k - 0.5), py0, slotW, ph);
  }

  // dB gridlines
  for (let db = 0; db > DB_FLOOR; db -= 12) {
    const py = dbY(db);
    ctx.beginPath();
    ctx.strokeStyle = db === 0 ? FAINT : GRID;
    ctx.lineWidth = 0.8;
    ctx.setLineDash(db === 0 ? [4, 4] : []);
    ctx.moveTo(px0, py);
    ctx.lineTo(px0 + pw, py);
    ctx.stroke();
    ctx.setLineDash([]);
    if (db === 0 || db === -24 || db === -48) {
      ctx.font = "12px Menlo, Consolas, monospace";
      ctx.fillStyle = MUT;
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillText(db === 0 ? "0dB" : String(db), px0 - 5, py);
    }
  }

  // hover: nearest harmonic slot
  let hoverK = null;
  if (hover && hover.x >= px0 && hover.x <= px0 + pw && hover.y >= py0 && hover.y <= baseY + labelStrip) {
    const k = Math.round((hover.x - px0) / pw * (HMAX + 0.5) - 0.5);
    if (k >= 0 && k <= KMAX) hoverK = k;
  }
  if (hoverK !== null) {
    ctx.fillStyle = "rgba(28,35,51,0.07)";
    ctx.fillRect(xOf(hoverK - 0.5), py0, slotW, ph);
  }

  // the analyzer curve: filled, riding a quiet floor between peaks
  ctx.save();
  ctx.beginPath();
  ctx.rect(px0, py0, pw, ph);
  ctx.clip();
  ctx.beginPath();
  ctx.moveTo(xOf(0), baseY);
  for (let k = 0; k <= MAXBIN; k++) {
    ctx.lineTo(xOf(k / CYC), baseY - curveDisp[k] * ph);
  }
  ctx.lineTo(xOf(MAXBIN / CYC), baseY);
  ctx.closePath();
  ctx.fillStyle = s.color;
  ctx.globalAlpha = 0.15;
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.beginPath();
  for (let k = 0; k <= MAXBIN; k++) {
    const px = xOf(k / CYC), py = baseY - curveDisp[k] * ph;
    k ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
  }
  ctx.strokeStyle = s.color;
  ctx.lineWidth = 1.6;
  ctx.lineJoin = "round";
  ctx.stroke();
  ctx.restore();

  // number labels
  const every = slotW >= 15 ? 1 : 2;
  for (let k = 0; k <= KMAX; k++) {
    if (k === 0 || k % every === (every === 2 ? 1 : 0)) {
      ctx.font = "12px Menlo, Consolas, monospace";
      ctx.fillStyle = k === 0 ? INK : k % 2 ? INK : MUT;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText(k === 0 ? "dc" : String(k), xOf(k), baseY + 5);
    }
  }

  // baseline
  ctx.beginPath();
  ctx.strokeStyle = INK;
  ctx.lineWidth = 1;
  ctx.moveTo(px0, baseY + 0.5);
  ctx.lineTo(px0 + pw, baseY + 0.5);
  ctx.stroke();

  // hover readout
  if (hoverK !== null) {
    let text;
    if (hoverK === 0) {
      text = `dc = ${fmt(dcValue)}`;
    } else {
      const amp = target[hoverK];
      text = amp < 1e-9 ? `k=${hoverK}  —` : `k=${hoverK}  ${(20 * Math.log10(amp)).toFixed(1)}dB`;
    }
    ctx.font = "13px Menlo, Consolas, monospace";
    ctx.fillStyle = INK;
    ctx.textAlign = "right";
    ctx.textBaseline = "top";
    ctx.fillText(text.replace("-", "−"), r.x + r.w - 10, r.y + 8);
  }

  panelFrame(r);
  label("spectrum (dB)", r.x + 8, r.y + 6, INK);
}

function draw() {
  const s = SHAPERS[state.shaper];
  const W = stage.clientWidth, H = stage.clientHeight;
  ctx.clearRect(0, 0, W, H);

  const rc = R.curve, ro = R.output;

  // ---- curve panel
  panelBase(rc);
  clipTo(rc, () => {
    axes(rc, true, true);
    curveTicks();

    // y = x reference
    ctx.beginPath();
    ctx.strokeStyle = FAINT;
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 4]);
    ctx.moveTo(ampX(-A), ampY(-A));
    ctx.lineTo(ampX(A), ampY(A));
    ctx.stroke();
    ctx.setLineDash([]);

    // bias marker
    if (Math.abs(state.bias) > 0.005) {
      ctx.beginPath();
      ctx.strokeStyle = s.color;
      ctx.globalAlpha = 0.55;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      const px = ampX(state.bias);
      ctx.moveTo(px, rc.y);
      ctx.lineTo(px, rc.y + rc.h);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    // the transfer curve: one solid, fixed object
    const N = 240;
    ctx.beginPath();
    for (let i = 0; i <= N; i++) {
      const x = -A + 2 * A * i / N;
      const px = ampX(x), py = ampY(s.f(x));
      i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
    }
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2.8;
    ctx.stroke();
  });
  panelFrame(rc);
  label("g(x)", rc.x + 8, rc.y + 6, INK);

  // ---- output panel
  panelBase(ro);
  clipTo(ro, () => {
    axes(ro, false, true);

    // dc line: the waveform's mean rides off center
    if (Math.abs(dcValue) > 0.02) {
      const py = ampY(dcValue);
      ctx.beginPath();
      ctx.strokeStyle = INK;
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 4]);
      ctx.moveTo(ro.x, py);
      ctx.lineTo(ro.x + ro.w, py);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      label("dc", ro.x + ro.w - 26, py - 15, MUT);
    }

    ctx.beginPath();
    const N = 600;
    for (let i = 0; i <= N; i++) {
      const t = i / N;
      const px = tX(t), py = ampY(s.f(inAt(t)));
      i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
    }
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2.2;
    ctx.stroke();
  });
  panelFrame(ro);
  label("y[n] = g(x[n])", ro.x + 8, ro.y + 6, INK);
  label("t →", ro.x + ro.w - 30, ro.y + ro.h - 18, MUT);

  // ---- spectrum panel
  drawSpectrum(R.spec, s);

  // ---- input range lines: the signal's reach at bias ± drive
  const clampX = px => Math.min(rc.x + rc.w, Math.max(rc.x, px));
  const xl = clampX(ampX(state.bias - state.drive));
  const xr = clampX(ampX(state.bias + state.drive));
  ctx.strokeStyle = s.color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.moveTo(xl, rc.y); ctx.lineTo(xl, rc.y + rc.h);
  ctx.moveTo(xr, rc.y); ctx.lineTo(xr, rc.y + rc.h);
  ctx.stroke();

  // resulting output range: what comes off the curve, out to the right
  let lo = Infinity, hi = -Infinity;
  for (let i = 0; i <= 240; i++) {
    const y = s.f(state.bias - state.drive + 2 * state.drive * i / 240);
    if (y < lo) lo = y;
    if (y > hi) hi = y;
  }
  const clampY = py => Math.min(rc.y + rc.h, Math.max(rc.y, py));
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.moveTo(rc.x, clampY(ampY(hi))); ctx.lineTo(ro.x + ro.w, clampY(ampY(hi)));
  ctx.moveTo(rc.x, clampY(ampY(lo))); ctx.lineTo(ro.x + ro.w, clampY(ampY(lo)));
  ctx.stroke();
  ctx.globalAlpha = 1;

  // ---- tracer: curve -> output
  const t = state.tau;
  const xv = inAt(t);
  const yv = s.f(xv);
  const cx = ampX(xv), cy = ampY(yv);
  const ox = tX(t), oy = cy;

  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = INK;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(ox, oy);
  ctx.stroke();
  ctx.restore();
  arrowHead(ox - 9, oy, 1, 0, 6, INK, 0.4);

  ctx.fillStyle = s.color;
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, 5.5, 0, 7); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(ox, oy, 4.5, 0, 7); ctx.fill();
}

// ---- animation & interaction --------------------------------------------

let last = performance.now();
function frame(now) {
  const dt = now - last;
  last = now;
  if (dirty) {
    computeSpectrum();
    computeCurve();
    dirty = false;
  }
  const k = reducedMotion ? 1 : 0.25;
  for (let i = 0; i <= MAXBIN; i++) {
    curveDisp[i] += (curveDb[i] - curveDisp[i]) * k;
  }
  if (!state.paused) state.tau = (state.tau + dt / PERIOD) % 1;
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

let scrubbing = false;
function scrub(e) {
  const rect = cv.getBoundingClientRect();
  const px = e.clientX - rect.left, py = e.clientY - rect.top;
  const ro = R.output;
  if (px >= ro.x && px <= ro.x + ro.w && py >= ro.y && py <= ro.y + ro.h) {
    state.tau = Math.min(0.999, Math.max(0, (px - ro.x) / ro.w));
    return true;
  }
  return false;
}
cv.addEventListener("pointerdown", e => {
  if (scrub(e)) {
    scrubbing = true;
    state.paused = true;
    cv.setPointerCapture(e.pointerId);
  } else {
    state.paused = !state.paused;
  }
});
cv.addEventListener("pointermove", e => {
  const rect = cv.getBoundingClientRect();
  hover = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  if (scrubbing) scrub(e);
});
cv.addEventListener("pointerleave", () => { hover = null; });
cv.addEventListener("pointerup", () => {
  scrubbing = false;
  if (!reducedMotion) state.paused = false;
});
window.addEventListener("keydown", e => {
  if (e.code === "Space" && !/^(INPUT|BUTTON)$/.test(e.target.tagName)) {
    e.preventDefault();
    state.paused = !state.paused;
  }
});
</script>
</body>
